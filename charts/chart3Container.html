<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>AirBnB Distance vs Price</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body {

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: auto;

    }

    #charts {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: flex-start;
    }

    .facet {
      display: flex;
      flex-direction: column;
      align-items: center;
    }


    .area {
      opacity: 0.4;
    }

    .line {
      fill: none;
      stroke-width: 2px;
    }

    .brush .selection {
      fill: gray;
      fill-opacity: 0.3;
    }

    .stats {
      font-size: 14px;
      margin-top: 5px;
    }
  </style>
</head>

<body>


  <h2>AirBnB Distance vs Price by Room Type</h2>

  <div id="charts"></div>

  <script src="chart3.js"></script>
</body>

</html>
